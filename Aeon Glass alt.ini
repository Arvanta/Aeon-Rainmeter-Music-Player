[Rainmeter]
Update=100
BackgroundMode=1
DynamicWindowSize=1

[Metadata]
Name=Aeon Glass (Dark Text Edition)
Author=Farshad Ghadiri
Version=1

[Variables]
FontName=Segoe UI
FontIcons=Font Awesome 7 Free
FontSizeText=9
FontSizeBtn=11

; --- رنگ‌های تیره برای والپیپرهای روشن ---
ColorText=40,40,40,255
ColorSubText=80,80,80,200
ColorBtn=60,60,60,200
ColorBtnHover=0,0,0,255
ColorBarBg=0,0,0,30
ColorBarFg=40,40,40,200
ColorRepeatOne=0,150,200,255

; ============================================================
;  Measures (بدون تغییر)
; ============================================================
[MeasureStatus]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Status

[MeasurePlayPause]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
Substitute="0":" Play ","1":" Pause ","2":" Play ","3":" Play "

[MeasureTrack]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title
Substitute="":"No Track"

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist
Substitute="":"Unknown"

[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover
DefaultPath=#@#Images\nocover.png

[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Progress

[MeasureRepeat]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Repeat
Substitute="0":" Repeat ","1":" Repeat ","2":" Repeat "
IfCondition=MeasureRepeat = 0
IfTrueAction=[!SetOption MeterRepeat FontColor "#ColorSubText#"][!UpdateMeter MeterRepeat][!Redraw]
IfCondition2=MeasureRepeat = 1
IfTrueAction2=[!SetOption MeterRepeat FontColor "#ColorRepeatOne#"][!UpdateMeter MeterRepeat][!Redraw]
IfCondition3=MeasureRepeat = 2
IfTrueAction3=[!SetOption MeterRepeat FontColor "#ColorBtnHover#"][!Redraw]

[MeasureShuffle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Shuffle
Substitute="0":" Shuffle ","1":" Shuffle "
IfCondition=MeasureShuffle = 0
IfTrueAction=[!SetOption MeterShuffle FontColor "#ColorSubText#"][!UpdateMeter MeterShuffle][!Redraw]
IfCondition2=MeasureShuffle = 1
IfTrueAction2=[!SetOption MeterShuffle FontColor "#ColorBtnHover#"][!Redraw]

; ============================================================
;  Meters
; ============================================================

[MeterMonitorPadding]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,300,104 | Fill Color 0,0,0,0 | Stroke Width 0 | Stroke Color 0,0,0,0
AntiAlias=1

[MeterCover]
Meter=Image
MeasureName=MeasureCover
X=15
Y=15
W=74
H=74
AntiAlias=1
DynamicVariables=1

[MeterTrackIcon]
Meter=String
X=90
Y=16
FontColor=#ColorSubText#
FontFace=#FontIcons#
FontWeight=900
FontSize=9
Text=" Music "
AntiAlias=1

[MeterTrack]
Meter=String
MeasureName=MeasureTrack
X=5R
Y=15
W=166
H=18
FontColor=#ColorText#
FontFace=#FontName#
FontSize=#FontSizeText#
FontWeight=600
AntiAlias=1
ClipString=1
Text="%1"

[MeterArtistIcon]
Meter=String
X=90
Y=36
FontColor=#ColorSubText#
FontFace=#FontIcons#
FontWeight=900
FontSize=9
Text=" User "
AntiAlias=1

[MeterArtist]
Meter=String
MeasureName=MeasureArtist
X=5R
Y=35
W=166
H=18
FontColor=#ColorSubText#
FontFace=#FontName#
FontSize=#FontSizeText#
FontWeight=400
AntiAlias=1
ClipString=1
Text="%1"

[MeterProgressBarBg]
Meter=Image
X=100
Y=59
W=180
H=3
SolidColor=#ColorBarBg#
LeftMouseUpAction=[!CommandMeasure MeasureProgress "SetPosition $MouseX:%$"][!UpdateMeasure MeasureProgress][!UpdateMeter MeterProgressBarFill][!Redraw]

[MeterProgressBarFill]
Meter=Bar
MeasureName=MeasureProgress
X=100
Y=59
W=180
H=3
BarColor=#ColorBarFg#
BarOrientation=Horizontal
DynamicVariables=1

[MeterPrev]
Meter=String
X=90
Y=72
FontColor=#ColorBtn#
FontFace=#FontIcons#
FontWeight=900
FontSize=#FontSizeBtn#
Text=" Backward "
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayPause "Previous"]
MouseOverAction=[!SetOption MeterPrev FontColor "#ColorBtnHover#"][!Redraw]
MouseLeaveAction=[!SetOption MeterPrev FontColor "#ColorBtn#"][!Redraw]

[MeterPlayPause]
Meter=String
MeasureName=MeasurePlayPause
X=6R
Y=72
FontColor=#ColorBtn#
FontFace=#FontIcons#
FontWeight=900
FontSize=#FontSizeBtn#
Text="%1"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayPause "PlayPause"]
MouseOverAction=[!SetOption MeterPlayPause FontColor "#ColorBtnHover#"][!Redraw]
MouseLeaveAction=[!SetOption MeterPlayPause FontColor "#ColorBtn#"][!Redraw]
DynamicVariables=1

[MeterNext]
Meter=String
X=6R
Y=72
FontColor=#ColorBtn#
FontFace=#FontIcons#
FontWeight=900
FontSize=#FontSizeBtn#
Text=" Forward "
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayPause "Next"]
MouseOverAction=[!SetOption MeterNext FontColor "#ColorBtnHover#"][!Redraw]
MouseLeaveAction=[!SetOption MeterNext FontColor "#ColorBtn#"][!Redraw]

[MeterRepeat]
Meter=String
MeasureName=MeasureRepeat
X=40R
Y=73
FontColor=#ColorSubText#
FontFace=#FontIcons#
FontWeight=900
FontSize=10
Text="%1"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayPause "Repeat"]
DynamicVariables=1

[MeterShuffle]
Meter=String
MeasureName=MeasureShuffle
X=6R
Y=73
FontColor=#ColorSubText#
FontFace=#FontIcons#
FontWeight=900
FontSize=10
Text="%1"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasurePlayPause "Shuffle"]
DynamicVariables=1